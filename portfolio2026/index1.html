        * {

            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        body {
            font-family: 'Space Mono', monospace;
            background: #0f0f1b;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            min-height: 100vh;
            color: #00ffff;
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        /* CRT Scanlines Effect */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15) 0px,
                rgba(0, 255, 255, 0.03) 1px,
                rgba(0, 0, 0, 0.15) 2px
            );
            pointer-events: none;
            z-index: 999;
        }

        /* Glitch Overlay */
        .glitch-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                90deg,
                rgba(255, 0, 255, 0.02) 0px,
                rgba(0, 255, 255, 0.02) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 998;
            animation: glitch-flicker 0.1s infinite;
            opacity: 0.5;
        }

        @keyframes glitch-flicker {
            0% { opacity: 0.5; }
            50% { opacity: 0.3; }
            100% { opacity: 0.5; }
        }

        /* Container */
        .game-container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            border: 4px solid #00ffff;
            box-shadow: 0 0 20px #00ffff, inset 0 0 20px #ff00ff;
            padding: 20px;
            background: rgba(15, 15, 27, 0.9);
            backdrop-filter: blur(2px);
            animation: border-pulse 2s infinite;
        }

        @keyframes border-pulse {
            0% { border-color: #00ffff; box-shadow: 0 0 20px #00ffff, inset 0 0 20px #ff00ff; }
            50% { border-color: #ff00ff; box-shadow: 0 0 30px #ff00ff, inset 0 0 30px #00ffff; }
            100% { border-color: #00ffff; box-shadow: 0 0 20px #00ffff, inset 0 0 20px #ff00ff; }
        }

        /* Header - Player Stats */
        .player-header {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 30px;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 255, 255, 0.05);
            border: 2px dashed #00ffff;
            position: relative;
        }

        .player-avatar {
            width: 100px;
            height: 100px;
            background: #0f0f1b;
            border: 3px solid #00ffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
            animation: glitch-avatar 3s infinite;
        }

        @keyframes glitch-avatar {
            0%, 100% { transform: skew(0deg, 0deg); }
            95% { transform: skew(5deg, 2deg); filter: hue-rotate(90deg); }
            96% { transform: skew(-5deg, -2deg); filter: hue-rotate(180deg); }
            97% { transform: skew(0deg, 0deg); filter: hue-rotate(0deg); }
        }

        .player-info {
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            line-height: 2;
        }

        .player-name {
            font-size: 24px;
            color: #00ffff;
            text-shadow: 3px 3px 0 #ff00ff;
            margin-bottom: 10px;
        }

        .player-stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stat-bar {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-label {
            color: #ff00ff;
            min-width: 60px;
        }

        .stat-fill {
            width: 150px;
            height: 10px;
            background: #1f1f3f;
            border: 1px solid #00ffff;
            position: relative;
            overflow: hidden;
        }

        .stat-fill::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 90%;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            animation: stat-pulse 2s infinite;
        }

        @keyframes stat-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .player-level {
            text-align: right;
            color: #ff00ff;
            font-family: 'Press Start 2P', cursive;
            font-size: 20px;
        }

        .level-number {
            font-size: 40px;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;
        }

        /* Navigation - Game Menu */
        .game-menu {
            display: flex;
            gap: 5px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .menu-item {
            flex: 1;
            min-width: 120px;
            padding: 15px;
            background: #0f0f1b;
            border: 2px solid #00ffff;
            color: #00ffff;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.1s;
            position: relative;
            overflow: hidden;
        }

        .menu-item:hover {
            background: #00ffff;
            color: #0f0f1b;
            border-color: #ff00ff;
            transform: scale(1.02);
            box-shadow: 0 0 20px #ff00ff;
        }

        .menu-item:active {
            transform: scale(0.98);
        }

        .menu-item::before {
            content: ">";
            position: absolute;
            left: -20px;
            transition: left 0.2s;
        }

        .menu-item:hover::before {
            left: 10px;
            color: #0f0f1b;
        }

        /* Main Content Area - Game Screen */
        .game-screen {
            min-height: 500px;
            border: 3px solid #00ffff;
            padding: 30px;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .screen-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            color: #ff00ff;
            border-bottom: 2px dashed #00ffff;
            padding-bottom: 10px;
        }

        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(180deg, transparent, rgba(0, 255, 255, 0.2));
            animation: scan 8s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: -10px; }
            100% { top: 100%; }
        }

        /* Game Cards - Interactive Elements */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            position: relative;
        }

        .game-card {
            background: rgba(15, 15, 27, 0.9);
            border: 2px solid #00ffff;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .game-card::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent,
                rgba(0, 255, 255, 0.1),
                transparent
            );
            transform: rotate(45deg);
            animation: card-shine 3s infinite;
            pointer-events: none;
        }

        @keyframes card-shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .game-card:hover {
            border-color: #ff00ff;
            box-shadow: 0 0 30px #ff00ff;
            transform: translateY(-5px);
        }

        .card-icon {
            font-size: 40px;
            color: #00ffff;
            margin-bottom: 15px;
            animation: icon-glitch 2s infinite;
        }

        @keyframes icon-glitch {
            0%, 100% { transform: none; filter: none; }
            92% { transform: skew(2deg, 0deg); filter: hue-rotate(90deg); }
            94% { transform: skew(-2deg, 0deg); filter: hue-rotate(180deg); }
            96% { transform: skew(0deg, 2deg); }
            98% { transform: skew(0deg, -2deg); }
        }

        .card-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            color: #ff00ff;
            margin-bottom: 10px;
        }

        .card-content {
            color: #00ffff;
            font-size: 12px;
            line-height: 1.6;
            opacity: 0.8;
        }

        /* Modal - Popup Window */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-window {
            width: 90%;
            max-width: 600px;
            background: #0f0f1b;
            border: 4px solid #00ffff;
            box-shadow: 0 0 50px #ff00ff, inset 0 0 30px #00ffff;
            position: relative;
            animation: modal-appear 0.3s;
        }

        @keyframes modal-appear {
            from { transform: scale(0.8) rotate(-2deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .modal-header {
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00ffff;
        }

        .modal-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            color: #0f0f1b;
        }

        .modal-close {
            background: none;
            border: 2px solid #0f0f1b;
            color: #0f0f1b;
            width: 30px;
            height: 30px;
            font-size: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: #0f0f1b;
            color: #ff00ff;
            border-color: #ff00ff;
        }

        .modal-body {
            padding: 30px;
            color: #00ffff;
            max-height: 60vh;
            overflow-y: auto;
        }

        /* Skills Tags */
        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
        }

        .skill-tag {
            background: #0f0f1b;
            border: 2px solid #ff00ff;
            color: #ff00ff;
            padding: 5px 10px;
            font-size: 10px;
            font-family: 'Press Start 2P', cursive;
            text-transform: uppercase;
        }

        .skill-tag:hover {
            background: #ff00ff;
            color: #0f0f1b;
            animation: glitch 0.1s infinite;
        }

        /* Timeline */
        .timeline-item {
            margin-bottom: 20px;
            padding-left: 20px;
            border-left: 4px solid #ff00ff;
            position: relative;
        }

        .timeline-item::before {
            content: "►";
            position: absolute;
            left: -12px;
            top: 0;
            color: #00ffff;
        }

        .timeline-date {
            color: #ff00ff;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            margin-bottom: 5px;
        }

        /* Progress bars */
        .progress-bar {
            width: 100%;
            height: 15px;
            background: #1f1f3f;
            border: 2px solid #00ffff;
            margin: 10px 0;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            animation: progress-pulse 2s infinite;
        }

        @keyframes progress-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Achievement Popup */
        .achievement-popup {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0f0f1b;
            border: 3px solid #00ffff;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 100;
        }

        .achievement-popup.show {
            transform: translateX(0);
        }

        .achievement-icon {
            font-size: 30px;
            color: #ff00ff;
        }

        .achievement-text {
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            color: #00ffff;
        }

        /* Footer */
        .game-footer {
            text-align: center;
            padding: 20px;
            border-top: 2px dashed #00ffff;
            color: #ff00ff;
            font-size: 10px;
            font-family: 'Press Start 2P', cursive;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 10px;
            background: #0f0f1b;
        }

        ::-webkit-scrollbar-thumb {
            background: #00ffff;
            border: 2px solid #ff00ff;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ff00ff;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .player-header {
                grid-template-columns: 1fr;
                text-align: center;
            }
            
            .player-avatar {
                margin: 0 auto;
            }
            
            .player-level {
                text-align: center;
            }
            
            .stat-fill {
                width: 100px;
            }
        }
    </style>
</head>

        let currentSection = 'about';

        // Show section in grid
        function showSection(section) {
            currentSection = section;
            document.getElementById('currentSection').innerHTML = `✦ ${gameData[section].title} ✦`;
            
            const grid = document.getElementById('contentGrid');
            grid.innerHTML = '';
            
            gameData[section].cards.forEach((card, index) => {
                const cardElement = document.createElement('div');
                cardElement.className = 'game-card';
                cardElement.onclick = () => openModal(section, index);
                cardElement.innerHTML = `
                    <div class="card-icon">
                        <i class="fas ${card.icon}"></i>
                    </div>
                    <div class="card-title">${card.title}</div>
                    <div class="card-content">${card.content}</div>
                `;
                grid.appendChild(cardElement);
            });
        }

        // Open modal with details
        function openModal(section, cardIndex) {
            const card = gameData[section].cards[cardIndex];
            document.getElementById('modalTitle').innerHTML = card.title;
            document.getElementById('modalBody').innerHTML = card.details;
            document.getElementById('modalOverlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
            
            // Show achievement popup
            showAchievement('VIEWING: ' + card.title);
        }

        // Close modal
        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Achievement popup
        function showAchievement(text) {
            const popup = document.getElementById('achievementPopup');
            document.getElementById('achievementText').innerHTML = text;
            popup.classList.add('show');
            
            setTimeout(() => {
                popup.classList.remove('show');
            }, 2000);
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Initialize with about section
        showSection('about');

        // Random glitch effect
        setInterval(() => {
            if (Math.random() > 0.7) {
                document.body.style.filter = `hue-rotate(${Math.random() * 360}deg)`;
                setTimeout(() => {
                    document.body.style.filter = 'none';
                }, 100);
            }
        }, 3000);
    </script>
